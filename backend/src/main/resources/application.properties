# ============================================================
# application.properties - Hospital Management System
# ============================================================

# ----- PostgreSQL Database Connection -----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hospital}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ----- JPA / Hibernate Settings -----
# 'create' will drop and recreate tables on startup (for first deployment)
# After tables are created, change to 'update' to preserve data
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ----- Server Port -----
server.port=${PORT:8080}
server.address=0.0.0.0
server.servlet.context-path=/

# ----- App Name -----
spring.application.name=hospital-management

# ----- CORS is handled in WebConfig.java -----

# ----- Database Configuration -----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/Hospital_Management_System?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}

# ----- JPA / Hibernate Settings -----
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ----- JWT Configuration -----
app.jwt.secret=${APP_JWT_SECRET:hospitalManagementJwtSecretKey2026SecureAndLongEnoughForHS256Algorithm}
app.jwt.expiration=86400000
