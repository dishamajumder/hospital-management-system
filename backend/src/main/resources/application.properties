# ============================================================
# application.properties - Hospital Management System
# ============================================================

# ----- PostgreSQL Database Connection -----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hospital}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ----- JPA / Hibernate Settings -----
# 'update' will create missing tables/columns during development without dropping data.
# Change to 'none' in production once the database schema is already created.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ----- Server Port -----
server.port=${PORT:8080}
server.address=0.0.0.0
server.servlet.context-path=/

# ----- App Name -----
spring.application.name=hospital-management

# ----- CORS is handled in WebConfig.java -----



# ----- JWT Configuration -----
app.jwt.secret=${APP_JWT_SECRET:hospitalManagementJwtSecretKey2026SecureAndLongEnoughForHS256Algorithm}
app.jwt.expiration=86400000
