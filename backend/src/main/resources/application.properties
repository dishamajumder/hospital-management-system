# ============================================================
# application.properties - Hospital Management System
# ============================================================

# ----- MySQL Database Connection -----
# Change 'root' and 'your_password' to your MySQL credentials
spring.datasource.url=jdbc:mysql://localhost:3306/Hospital_Management_System?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----- JPA / Hibernate Settings -----
# 'update' will create missing tables/columns during development without dropping data.
# Change to 'none' in production once the database schema is already created.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ----- Server Port -----
server.port=8080
server.address=0.0.0.0

# ----- App Name -----
spring.application.name=hospital-management

# ----- CORS is handled in WebConfig.java -----

# ----- JWT Configuration -----
app.jwt.secret=hospitalManagementJwtSecretKey2026SecureAndLongEnoughForHS256Algorithm
app.jwt.expiration=86400000
